function NumberField({ label, name, value, onChange, min, max, step, placeholder }) {

    </div>
  );
}

function InterestTagSelector({ selected, onChange }) {
  const selectedArr = selected ? selected.split(',').map(s => s.trim()).filter(Boolean) : [];
  const toggle = (tag) => {
    const next = selectedArr.includes(tag) ? selectedArr.filter(t => t !== tag) : [...selectedArr, tag];
    onChange(next.join(', '));
  };
  return (
    <div className="flex flex-col gap-2">
      <label className="text-xs font-medium text-slate-400 uppercase tracking-wide">Interest Tags</label>
      <div className="flex flex-wrap gap-2 p-3 bg-slate-800 border border-slate-700 rounded-lg min-h-[56px]">
        {INTEREST_POOL.map(tag => {
          const active = selectedArr.includes(tag);
          return (
            <button key={tag} type="button" onClick={() => toggle(tag)}
              className={`tag-pill px-3 py-1 rounded-full text-xs font-medium border transition-colors ${
                active ? 'bg-rose-500 border-rose-400 text-white' : 'bg-slate-700 border-slate-600 text-slate-300 hover:border-rose-500 hover:text-rose-300'
              }`}>
              {active ? '✓ ' : ''}{tag}
            </button>
          );
        })}
      </div>
      {selectedArr.length > 0 && (
        <p className="text-xs text-slate-500">Payload: <span className="text-rose-400 font-mono">{selected}</span></p>
      )}
    </div>
  );
}

}

function RiskBadge({ level }) {
  const cfg = {

    'Medium':   { bg: 'bg-amber-500/15 border-amber-500/40',     text: 'text-amber-400',   dot: 'bg-amber-400'   },
    'High':     { bg: 'bg-orange-500/15 border-orange-500/40',   text: 'text-orange-400',  dot: 'bg-orange-400'  },
    'Critical': { bg: 'bg-rose-500/15 border-rose-500/40',       text: 'text-rose-400',    dot: 'bg-rose-400'    },
  }[level] || { bg: 'bg-slate-700', text: 'text-slate-400', dot: 'bg-slate-400' };
  return (
    <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full border text-xs font-semibold ${cfg.bg} ${cfg.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`} />
      {level} Risk

  );
}

    red_flags.includes('low_match_rate') ? '🚩 Very few mutual matches relative to likes received — suggests fake or stolen photos.'     : '✅ Like-to-mutual-match ratio looks organic.',
    red_flags.includes('odd_hours')      ? '🚩 Activity concentrated in unusual hours — may indicate a scripted or overseas operation.'  : '✅ Active-hour pattern is consistent with normal user behaviour.',
    red_flags.includes('no_messages')    ? '🚩 Minimal messaging despite many matches — genuine users typically engage in conversation.' : '✅ Message activity aligns with real user engagement.',

    <div className="fade-in space-y-6">
      <div className={`flex items-center justify-between p-4 rounded-xl border ${
        catfish_prob >= 70 ? 'bg-rose-500/10 border-rose-500/30' :
        catfish_prob >= 40 ? 'bg-amber-500/10 border-amber-500/30' :

          <p className="text-xs text-slate-500 mb-0.5">Model Verdict</p>

            {catfish_prob >= 70 ? '⚠️ Likely Catfish' : catfish_prob >= 40 ? '🔍 Suspicious Profile' : '✅ Appears Genuine'}
          </p>
        </div>
        <RiskBadge level={risk_level} />
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        {[
          { label: 'Catfish Probability', value: `${catfish_prob}%`,         color: catfish_prob >= 70 ? 'text-rose-400' : catfish_prob >= 40 ? 'text-amber-400' : 'text-emerald-400', bg: catfish_prob >= 70 ? 'bg-rose-500/10 border-rose-500/30' : catfish_prob >= 40 ? 'bg-amber-500/10 border-amber-500/30' : 'bg-emerald-500/10 border-emerald-500/30' },
          { label: 'Authenticity Score',  value: `${authenticity_score}/100`, color: 'text-indigo-400',  bg: 'bg-indigo-500/10 border-indigo-500/30'  },
          { label: 'Suspicion Index',     value: suspicion_index,             color: 'text-purple-400',  bg: 'bg-purple-500/10 border-purple-500/30'  },
        ].map(c => (
          <div key={c.label} className={`rounded-xl border p-4 text-center ${c.bg}`}>
            <p className="text-xs text-slate-500 mb-1">{c.label}</p>
            <p className={`text-3xl font-bold ${c.color}`}>{c.value}</p>
          </div>

      <div className="space-y-3">
        <ProgressBar value={catfish_prob}           color={catfish_prob >= 70 ? 'bg-rose-500' : catfish_prob >= 40 ? 'bg-amber-500' : 'bg-emerald-500'} label="Catfish Probability" />
        <ProgressBar value={authenticity_score}     color="bg-indigo-500" label="Authenticity Score" />
        <ProgressBar value={behavioral_consistency} color="bg-purple-500" label="Behavioural Consistency" />

        <div className="flex items-center gap-2 px-3 py-2 bg-rose-500/10 border border-rose-500/20 rounded-lg text-xs text-rose-400">

          </div>

// ─── Analytics: Chart 1 — Swipe Dynamics vs Risk ─────────────────────────────

function SwipeDynamicsChart({ records }) {
  const labels = ['Swipe Maniac', 'Optimistic', 'Balanced', 'Choosy'];
  const data = labels.map(label => {
    const group   = records.filter(r => r.swipe_right_label === label);
    const flagged = group.filter(r => r.catfish_prob >= 50);
    return { label, total: group.length, flagged: flagged.length };
  });
  const max = Math.max(...data.map(d => d.total), 1);
  return (
    <div className="space-y-4">
      {data.map(({ label, total, flagged }) => (
        <div key={label} className="space-y-1.5">
          <div className="flex justify-between text-xs">
            <span className="text-slate-300 font-medium">{label}</span>
            <span className="text-slate-500">{flagged} / {total} flagged</span>
          </div>
          <div className="space-y-1">
            <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
              <div className="h-full bg-slate-500 rounded-full bar-grow" style={{ '--target-width': `${(total / max) * 100}%` }} />
            </div>
            <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
              <div className="h-full bg-rose-500 rounded-full bar-grow" style={{ '--target-width': `${(flagged / max) * 100}%` }} />
            </div>
          </div>
        </div>
      ))}
      <div className="flex gap-5 pt-2 text-xs text-slate-500">
        <span className="flex items-center gap-1.5"><span className="w-3 h-1.5 bg-slate-500 rounded inline-block" /> Total Profiles</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-1.5 bg-rose-500 rounded inline-block" /> Flagged Catfish</span>
      </div>
    </div>
  );
}

// ─── Analytics: Chart 2 — Demographic Risk Matrix ────────────────────────────

function DemographicRiskMatrix({ records }) {
  const incomes    = ['Very Low', 'Low', 'Middle', 'Upper-Middle', 'High', 'Very High'];
  const educations = ['No Formal Education', 'High School', "Bachelor's", "Master's", 'PhD'];
  const shortInc   = { 'Very Low':'V.Low', 'Low':'Low', 'Middle':'Mid', 'Upper-Middle':'U-Mid', 'High':'High', 'Very High':'V.High' };
  const shortEdu   = { 'No Formal Education':'No Formal', 'High School':'H.School', "Bachelor's":'BSc', "Master's":'MSc', 'PhD':'PhD' };

  const cellVal = (inc, edu) => {
    const g = records.filter(r => r.income_bracket === inc && r.education_level === edu);
    if (!g.length) return null;
    return Math.round(g.reduce((s, r) => s + r.catfish_prob, 0) / g.length);
  };
  const cellStyle = v => {
    if (v === null) return 'bg-slate-800/40 text-slate-700';
    if (v >= 70) return 'bg-rose-500/80 text-white font-semibold';
    if (v >= 50) return 'bg-orange-500/70 text-white font-semibold';
    if (v >= 30) return 'bg-amber-500/60 text-slate-900 font-medium';
    return 'bg-emerald-500/50 text-slate-900 font-medium';
  };
  return (
    <div>
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr>
              <th className="py-1.5 pr-3 text-left text-slate-600 font-normal whitespace-nowrap">Edu ↓ / Income →</th>
              {incomes.map(i => <th key={i} className="px-1 py-1.5 text-slate-500 font-normal text-center whitespace-nowrap">{shortInc[i]}</th>)}
            </tr>
          </thead>
          <tbody>
            {educations.map(edu => (
              <tr key={edu}>
                <td className="py-1 pr-3 text-slate-400 whitespace-nowrap">{shortEdu[edu]}</td>
                {incomes.map(inc => {
                  const v = cellVal(inc, edu);
                  return (
                    <td key={inc} className="px-1 py-1 text-center">
                      <div className={`rounded px-1 py-0.5 text-center ${cellStyle(v)}`}>{v !== null ? `${v}%` : '—'}</div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="flex flex-wrap gap-3 mt-4 text-xs text-slate-500">
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-500/50 inline-block" /> &lt;30% Low</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-amber-500/60 inline-block" /> 30–50% Med</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-500/70 inline-block" /> 50–70% High</span>
        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-rose-500/80 inline-block" /> &gt;70% Critical</span>
      </div>
    </div>
  );
}

  const TIME_ORDER = ['Early Morning', 'Morning', 'Afternoon', 'Evening', 'Late Night', 'After Midnight'];
  const SHORT      = ['Early AM', 'Morning', 'Afternoon', 'Evening', 'Late Night', 'After Mid.'];
  const pts_data = TIME_ORDER.map(slot => ({
    label: slot,
    flagged: records.filter(r => r.swipe_time_of_day === slot && r.catfish_prob >= 50).length,
    total:   records.filter(r => r.swipe_time_of_day === slot).length,
  }));

  const W = 480, H = 110, PL = 28, PR = 12, PT = 12, PB = 28;
  const iW = W - PL - PR, iH = H - PT - PB;
  const maxVal = Math.max(...pts_data.map(d => d.flagged), 1);

  const pts = pts_data.map((d, i) => ({
    x: PL + (i / (pts_data.length - 1)) * iW,
    y: PT + iH - (d.flagged / maxVal) * iH,
    ...d,
  }));

  // Smooth cubic bezier path
  const linePath = pts.reduce((acc, p, i) => {
    if (i === 0) return `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    const prev = pts[i - 1];
    const cpx = ((p.x + prev.x) / 2).toFixed(1);
    return `${acc} C ${cpx} ${prev.y.toFixed(1)} ${cpx} ${p.y.toFixed(1)} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
  }, '');
  const areaPath = `${linePath} L ${pts[pts.length-1].x.toFixed(1)} ${(PT + iH).toFixed(1)} L ${pts[0].x.toFixed(1)} ${(PT + iH).toFixed(1)} Z`;

  // Y-axis grid lines (0, 25%, 50%, 75%, 100%)
  const gridY = [0, 0.25, 0.5, 0.75, 1].map(f => PT + iH - f * iH);

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ height: '130px' }}>
        <defs>
          <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f43f5e" stopOpacity="0.35" />
            <stop offset="100%" stopColor="#f43f5e" stopOpacity="0.02" />
          </linearGradient>
        </defs>
        {gridY.map((y, i) => (
          <line key={i} x1={PL} y1={y} x2={W - PR} y2={y} stroke="#1e293b" strokeWidth="1" strokeDasharray="4 3" />
        ))}
        <path d={areaPath} fill="url(#curveGrad)" />
        <path d={linePath} fill="none" stroke="#f43f5e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {pts.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="5" fill="#0f172a" stroke="#f43f5e" strokeWidth="2" />
            <text x={p.x} y={p.y - 9} textAnchor="middle" fontSize="9" fill="#f87171">{p.flagged}</text>
            <text x={p.x} y={H - 6} textAnchor="middle" fontSize="8.5" fill="#475569">{SHORT[i]}</text>
          </g>
        ))}
        <text x={PL - 4} y={PT + iH / 2} textAnchor="middle" fontSize="8" fill="#475569" transform={`rotate(-90, ${PL - 12}, ${PT + iH / 2})`}>Catfish</text>
      </svg>
    </div>
  );
}

function randomDemoState() {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const randInt = (min, max) => String(Math.floor(Math.random() * (max - min + 1)) + min);
  const randFloat = (min, max, decimals) => (Math.random() * (max - min) + min).toFixed(decimals);
  const numTags = Math.floor(Math.random() * 4) + 2;
  const shuffled = [...INTEREST_POOL].sort(() => Math.random() - 0.5);
  return {
    gender:               pick(DROPDOWN_OPTIONS.gender),
    sexual_orientation:   pick(DROPDOWN_OPTIONS.sexual_orientation),
    location_type:        pick(DROPDOWN_OPTIONS.location_type),
    income_bracket:       pick(DROPDOWN_OPTIONS.income_bracket),
    education_level:      pick(DROPDOWN_OPTIONS.education_level),
    app_usage_time_label: pick(DROPDOWN_OPTIONS.app_usage_time_label),
    swipe_right_label:    pick(DROPDOWN_OPTIONS.swipe_right_label),
    swipe_time_of_day:    pick(DROPDOWN_OPTIONS.swipe_time_of_day),
    interest_tags:        shuffled.slice(0, numTags).join(', '),
    app_usage_time_minute: randInt(5, 300),
    swip_right_ratio:     randFloat(0.01, 1.0, 2),
    likes_received:       randInt(0, 1000),
    mutual_matches:       randInt(0, 100),
    profile_pics_count:   randInt(0, 20),
    bio_length:           randInt(0, 300),
    message_sent_count:   randInt(0, 500),
    emoji_usage_rate:     randFloat(0.0, 1.0, 2),
    last_active_hour:     randInt(0, 23),
  };
}

function PredictorView({ formData, setFormData, loading, setLoading, result, setResult, errors, setErrors, apiError, setApiError }) {
  const [demoClickCount, setDemoClickCount] = useState(0);

  const handleChange = useCallback((e) => {
    const { name, value } = e.target;
    setFormData(prev => ({ ...prev, [name]: value }));
    setErrors(prev => ({ ...prev, [name]: undefined }));
  }, [setFormData, setErrors]);

  const handleTagChange = useCallback((tagString) => {
    setFormData(prev => ({ ...prev, interest_tags: tagString }));
  }, [setFormData]);

  const handleDemo = useCallback(() => {
    setDemoClickCount(prev => {
      const newCount = prev + 1;
      setFormData(newCount === 1 ? DEMO_STATE : randomDemoState());
      setErrors({});
      return newCount;
    });
  }, [setFormData, setErrors]);

  const validate = () => {
    const errs = {};
    Object.keys(INITIAL_STATE).forEach(k => {
      if (formData[k] === '' || formData[k] === null || formData[k] === undefined) errs[k] = 'Required';
    });
    return errs;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length > 0) {
      setErrors(errs);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    setLoading(true);
    setResult(null);
    setApiError(null);

    // Cast numeric string fields to their correct JS types before sending.
    const payload = {
      ...formData,
      app_usage_time_minute: parseInt(formData.app_usage_time_minute, 10),
      swip_right_ratio:      parseFloat(formData.swip_right_ratio),
      likes_received:        parseInt(formData.likes_received, 10),
      mutual_matches:        parseInt(formData.mutual_matches, 10),
      profile_pics_count:    parseInt(formData.profile_pics_count, 10),
      bio_length:            parseInt(formData.bio_length, 10),
      message_sent_count:    parseInt(formData.message_sent_count, 10),
      emoji_usage_rate:      parseFloat(formData.emoji_usage_rate),
      last_active_hour:      parseInt(formData.last_active_hour, 10),
    };

    try {
      const response = await fetch(`${API_BASE}/detect_catfish`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      if (!response.ok) {
        const detail = await response.json().catch(() => ({}));
        throw new Error(detail?.detail || `Server error ${response.status}`);
      }
      const data = await response.json();
      setResult(data);
    } catch (err) {
      console.error('Detection failed:', err);
      setApiError(err.message || 'Could not reach the detection API.');
    } finally {
      setLoading(false);
    }
  };

  const hasErrors = Object.values(errors).some(Boolean);

  return (
    <div className="max-w-5xl mx-auto px-4 py-10">
      <div className="mb-10 text-center">
        <div className="inline-flex items-center gap-2 bg-rose-500/10 border border-rose-500/30 rounded-full px-4 py-1.5 text-xs text-rose-400 font-medium mb-4">
          🐟 ML-Powered Catfish Detection Engine
        </div>
        <h1 className="text-4xl font-bold bg-gradient-to-r from-rose-400 via-orange-400 to-amber-400 bg-clip-text text-transparent mb-2">
          Catfish Detector
        </h1>
        <p className="text-slate-500 text-sm max-w-xl mx-auto">
          Enter a profile's behavioural and usage data across 18 features. Our ML model will assess the likelihood that this is a fake or catfish profile.
        </p>
      </div>

      {hasErrors && (
        <div className="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm fade-in">
          ⚠️ Please fill in all required fields before running detection.
        </div>
      )}
      {apiError && (
        <div className="mb-6 p-4 rounded-xl bg-orange-500/10 border border-orange-500/30 text-orange-400 text-sm fade-in flex items-start gap-3">
          <span className="text-lg shrink-0">🔌</span>
          <div>
            <p className="font-semibold mb-0.5">Backend Connection Error</p>
            <p className="text-orange-300/80">{apiError}</p>
            <p className="mt-1 text-xs text-orange-400/60">Run the FastAPI backend locally with <code className="bg-slate-800 px-1 rounded">uvicorn main:app --reload --port 8000</code></p>
          </div>
        </div>
      )}

      <form onSubmit={handleSubmit} noValidate>
        <div className="space-y-6">

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
            <div className="flex items-center justify-between mb-5">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg bg-slate-700/50 flex items-center justify-center text-lg">👤</div>
                <div>
                  <h2 className="text-base font-semibold text-slate-100">Profile Details</h2>
                  <p className="text-xs text-slate-500">Claimed identity attributes of the profile</p>
                </div>
              </div>
              <button type="button" onClick={handleDemo}
                className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 bg-slate-800 text-slate-400 hover:text-slate-200 hover:border-rose-500/60 hover:bg-rose-500/10 transition-colors whitespace-nowrap">
                Fill demo data
              </button>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <SelectField label="Gender"            name="gender"            value={formData.gender}            options={DROPDOWN_OPTIONS.gender}            onChange={handleChange} />
              <SelectField label="Sexual Orientation" name="sexual_orientation" value={formData.sexual_orientation} options={DROPDOWN_OPTIONS.sexual_orientation} onChange={handleChange} />
              <SelectField label="Location Type"     name="location_type"     value={formData.location_type}     options={DROPDOWN_OPTIONS.location_type}     onChange={handleChange} />

              <SelectField label="Education Level"   name="education_level"   value={formData.education_level}   options={DROPDOWN_OPTIONS.education_level}   onChange={handleChange} />

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <SelectField label="Usage Time Label"       name="app_usage_time_label" value={formData.app_usage_time_label} options={DROPDOWN_OPTIONS.app_usage_time_label} onChange={handleChange} />

              <NumberField label="Last Active Hour (0–23)" name="last_active_hour"      value={formData.last_active_hour}      onChange={handleChange} min={0} max={23}   placeholder="e.g. 21"  />
              <NumberField label="Messages Sent"          name="message_sent_count"    value={formData.message_sent_count}    onChange={handleChange} min={0} max={10000} placeholder="e.g. 120" />
              <NumberField label="Emoji Usage Rate (0–1)" name="emoji_usage_rate"      value={formData.emoji_usage_rate}      onChange={handleChange} min={0} max={1} step={0.01} placeholder="e.g. 0.45" />
              <NumberField label="Bio Length (chars)"     name="bio_length"            value={formData.bio_length}            onChange={handleChange} min={0} max={500}  placeholder="e.g. 150" />
            </div>
          </div>

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
            <SectionHeader icon="👆" title="Swipe Behaviour" subtitle="Patterns in how the profile interacts with others" />
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <SelectField label="Swipe Right Label"      name="swipe_right_label"  value={formData.swipe_right_label}  options={DROPDOWN_OPTIONS.swipe_right_label}  onChange={handleChange} />
              <SelectField label="Swipe Time of Day"      name="swipe_time_of_day"  value={formData.swipe_time_of_day}  options={DROPDOWN_OPTIONS.swipe_time_of_day}  onChange={handleChange} />
              <NumberField label="Swipe Right Ratio (0–1)" name="swip_right_ratio"  value={formData.swip_right_ratio}   onChange={handleChange} min={0} max={1} step={0.01} placeholder="e.g. 0.65" />
              <NumberField label="Likes Received"         name="likes_received"     value={formData.likes_received}     onChange={handleChange} min={0} max={10000} placeholder="e.g. 340" />
              <NumberField label="Mutual Matches"         name="mutual_matches"     value={formData.mutual_matches}     onChange={handleChange} min={0} max={1000}  placeholder="e.g. 28"  />
            </div>
          </div>

          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
            <SectionHeader icon="🎯" title="Interests" subtitle="Claimed interests (multi-select → comma-separated string)" />
            <InterestTagSelector selected={formData.interest_tags} onChange={handleTagChange} />
          </div>

          <button type="submit" disabled={loading}
            className="w-full py-4 rounded-xl text-base font-semibold bg-gradient-to-r from-rose-500 to-orange-500 hover:from-rose-400 hover:to-orange-400 text-white transition-all duration-200 shadow-lg shadow-rose-500/20 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-3">
            {loading ? (
              <>
                <svg className="spinner w-5 h-5" viewBox="0 0 24 24" fill="none">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                Running ML Model…
              </>
            ) : <>🐟 Analyse for Catfish</>}
          </button>
        </div>
      </form>

      {(loading || result) && (
        <div className="mt-8 bg-slate-900 border border-slate-800 rounded-2xl p-6">
          <div className="flex items-center gap-3 mb-6 pb-5 border-b border-slate-800">
            <div className="w-9 h-9 rounded-lg bg-rose-500/20 flex items-center justify-center text-lg">🐟</div>

              <h2 className="text-base font-semibold text-slate-100">Detection Results</h2>
              <p className="text-xs text-slate-500">{loading ? 'Scanning profile for catfish signals…' : 'Based on 18-feature behavioural analysis'}</p>
            </div>

          {loading && (

              <svg className="spinner w-12 h-12 text-rose-400" viewBox="0 0 24 24" fill="none">
                <circle className="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3"/>
                <path className="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              <p className="text-slate-400 text-sm">Scanning behavioural signals for catfish indicators…</p>
              <div className="flex gap-1.5">
                {[0,1,2].map(i => (
                  <div key={i} className="w-2 h-2 rounded-full bg-rose-500/60" style={{ animation: `fadeIn 0.6s ease-in-out ${i * 0.2}s infinite alternate` }} />

          {result && !loading && <ResultPanel result={result} />}

// ─── Navigation Bar ───────────────────────────────────────────────────────────

function NavBar({ activeTab, setActiveTab }) {
  return (
    <header className="sticky top-0 z-50 bg-slate-950/95 backdrop-blur-sm border-b border-slate-800/80">
      <div className="max-w-6xl mx-auto px-4 flex items-center h-14 gap-4">
        <div className="flex items-center gap-2">
          <span className="text-xl">🐟</span>
          <span className="font-bold text-slate-100 text-sm">Catfish Detector</span>
        </div>
      </div>
    </header>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
// Form state is hoisted here so it persists when the user switches tabs.

function App() {
  // Predictor state — lives here so tab switches don't clear the form
  const [formData,  setFormData]  = useState(INITIAL_STATE);
  const [loading,   setLoading]   = useState(false);
  const [result,    setResult]    = useState(null);
  const [errors,    setErrors]    = useState({});
  const [apiError,  setApiError]  = useState(null);

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100">
      <NavBar />
      <PredictorView
        formData={formData}  setFormData={setFormData}
        loading={loading}    setLoading={setLoading}
        result={result}      setResult={setResult}
        errors={errors}      setErrors={setErrors}
        apiError={apiError}  setApiError={setApiError}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
